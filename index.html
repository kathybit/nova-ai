<!DOCTYPE html>
<html lang="en">
<head>

    <title>NOVA QMS & AI</title>

        header {
            background: linear-gradient(135deg, #0a1a3c, #1c3d7a);
            color: white;
            padding: 80px 20px;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        }

            margin: 15px auto 0;
        }

        /* SECTIONS */
        .section {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }
        .section h2 {
            text-align: center;
            color: #0a1a3c;
            margin-bottom: 40px;
        }

        .cards {
